name: Continuous Deployment

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

  pull_request:

jobs:
  
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Tear down any previous containers
        run: docker compose -f test/docker-compose.yml down -v

      - name: Build and run tests
        run: docker compose -f test/docker-compose.yml up --build --exit-code-from test

      - name: Tear down after tests
        if: always()
        run: docker compose -f test/docker-compose.yml down -v
  
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write  
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
    
  lint:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run Black
        uses: psf/black@stable
        with:
          options: "--verbose"
          src: "."

      - name: Run Hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./remote_files"

      # auto commit
      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fixes by CI [skip ci]"

  build:
    needs: [lint, analyze] # shift left 
    if: github.event_name == 'push' # this should ensure we only deploy when we push to main, and not when we make prs
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }} # Ensures we build with the version after lint

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3 # Used to create both mac and windows images

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      #first build, but dont push
      - name: Build 
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest
      
      #then scan the image with DS and fail if any critical vulnerabilites are found 
      - name: Scan image with Docker Scout
        uses: docker/scout-action@481412c8b8de36d0f79e85aa382c60397466feb6 #v1 got this sha from: git ls-remote https://github.com/docker/scout-action refs/tags/v1
        with:
          command: cves
          image: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest
          fail-on: critical 
      
      #push at the end after scan
      - name: Push minitwitimage
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true                     
          platforms: linux/amd64,linux/arm64  
          tags: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest

      

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest'
          format: 'table'
          exit-code: '1' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'      

      - name: Build and push prometheus_image
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/prometheus
          file: ./monitoring/prometheus/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/prometheus_image:latest

      - name: Build and push grafana_image
        uses: docker/build-push-action@v6
        with:
          context: ./monitoring/grafana
          file: ./monitoring/grafana/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ secrets.DOCKER_USERNAME }}/grafana_image:latest

      # COMMENTED OUT: MySQL and Flagtool
      # - name: Build and push mysqlimage ...
      # - name: Build and push flagtoolimage ...

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh/
          echo "$SSH_KEY" > ~/.ssh/do_ssh_key
          chmod 600 ~/.ssh/do_ssh_key
        env:
          SSH_KEY: ${{ secrets.SSH_KEY }}

      - name: Copy deployment files to server
        run: |
          # Sync the 'remote_files' folder content to the server
          scp -r -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no remote_files/* $SSH_USER@$SSH_HOST:/minitwit/
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Execute remote deployment script
        run: |
          ssh $SSH_USER@$SSH_HOST -i ~/.ssh/do_ssh_key -o StrictHostKeyChecking=no \
          "export DOCKER_USERNAME='${{ secrets.DOCKER_USERNAME }}' && /minitwit/deploy.sh"
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            Automated release from CI/CD pipeline.
            Docker Image: ${{ secrets.DOCKER_USERNAME }}/minitwitimage:latest
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
