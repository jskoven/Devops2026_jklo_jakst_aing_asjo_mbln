networks:
  minitwit-network:
    external: false
    name: minitwit-network

services:
  minitwit:
    image: ${DOCKER_USERNAME}/minitwitimage:latest
    container_name: minitwit-prod
    ports:
      - "80:5001" 
    environment:
      - DATABASE_URL=postgresql://minitwit_admin:12345@10.114.0.2:5432/minitwit
    networks:
      - minitwit-network
    depends_on:
      - grafana
      - prometheus
 
    restart: always

  prometheus:
    image: ${DOCKER_USERNAME}/prometheus_image:latest
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    ports:
      - "9090:9090"
    networks:
      - minitwit-network

  grafana:
    image: ${DOCKER_USERNAME}/grafana_image:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - minitwit-network
    volumes:
      - grafana-storage:/var/lib/grafana
    restart: always

volumes:
  grafana-storage: {}